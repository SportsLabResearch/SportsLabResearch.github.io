site_name: BreastCancer Wellbeing Analyzer
site_description: Scientific documentation for SportsLabResearch-BreastCancer-Wellbeing-Analyzer
site_author: José Pino Ortega · SportsLabResearch
site_url: https://sportslabresearch.github.io/SportsLabResearch-BreastCancer-Wellbeing-Analyzer/

repo_url: https://github.com/SportsLabResearch/SportsLabResearch-BreastCancer-Wellbeing-Analyzer
repo_name: SportsLabResearch/SportsLabResearch-BreastCancer-Wellbeing-Analyzer
edit_uri: ""

copyright: Copyright © 2026 SportsLabResearch

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quick-start.md
  - User Guide: user-guide.md
  - Variables: variables.md
  - Reports: reports.md
  - Citation: citation.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css
