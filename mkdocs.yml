site_name: SportsLabResearch
site_description: Open Scientific Software for Sport and Health Sciences
site_url: https://sportslabresearch.github.io/

repo_name: SportsLabResearch
repo_url: https://github.com/SportsLabResearch

theme:
  name: material
  logo: assets/images/logo-header.png
  favicon: assets/images/logo-header.png
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

nav:
  - Home: index.md
  - Organization: organization.md
  - Products: products.md
  - Research: research.md
  - Publications: publications.md
  - Documentation: documentation.md
  - Education: education.md
  - Services: services.md
  - News: news.md
  - Contact: contact.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SportsLabResearch
    - icon: fontawesome/solid/globe
      link: https://sportslabresearch.github.io/

copyright: © 2026 SportsLabResearch

