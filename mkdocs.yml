site_name: SportsLabResearch
site_description: Open scientific software, reproducible research and technological solutions for sport and health sciences
site_author: José Pino Ortega · SportsLabResearch
site_url: https://sportslabresearch.github.io/
repo_url: https://github.com/SportsLabResearch/SportsLabResearch.github.io
repo_name: SportsLabResearch/SportsLabResearch.github.io
edit_uri: ""
copyright: Copyright © 2026 SportsLabResearch

theme:
  name: material
  language: en
  logo: assets/sportslabresearch-header-logo.png
  favicon: assets/sportslabresearch-favicon.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

nav:
  - Home: index.md
  - Organization: organization.md
  - Products: products.md
  - Research: research.md
  - Publications: publications.md
  - Documentation: documentation.md
  - Education: education.md
  - Services: services.md
  - News: news.md
  - Contact: contact.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css
