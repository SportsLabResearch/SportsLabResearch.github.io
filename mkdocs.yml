site_name: SportsLabResearch
site_description: Research Software for Sport Science
site_author: SportsLabResearch
site_url: https://sportslabresearch.github.io/SportsLabResearch/

repo_name: SportsLabResearch
repo_url: https://github.com/SportsLabResearch/SportsLabResearch
edit_uri: ""

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/sportslabresearch-header-logo.png
  favicon: assets/sportslabresearch-favicon.png

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy

  palette:
    - scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: Inter
    code: Roboto Mono

nav:
  - Home: index.md
  - About: about.md
  - Portfolio: portfolio.md
  - Framework: framework.md
  - Standards: standards.md
  - Publications: publications.md
  - Contact: contact.md

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/site-title.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SportsLabResearch
      name: SportsLabResearch on GitHub

copyright: >
  © 2026 SportsLabResearch · Research Software for Sport Science