site_name: SportsLabResearch
site_description: Open scientific software and digital technologies for sport science, exercise and health
site_author: SportsLabResearch
site_url: https://sportslabresearch.github.io/

repo_name: SportsLabResearch
repo_url: https://github.com/SportsLabResearch

copyright: Copyright &copy; SportsLabResearch · Open science, reproducible research and technology transfer

theme:
  name: material
  language: en
  logo: assets/sportslabresearch-symbol-clean.png
  favicon: assets/sportslabresearch-favicon.png
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: cyan
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tooltips

nav:
  - Home: index.md
  - About: about.md
  - Research Framework: framework.md
  - Standards: standards.md
  - Software Portfolio: portfolio.md
  - Publications: publications.md
  - Contact: contact.md

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/site-title.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SportsLabResearch
      name: SportsLabResearch on GitHub
