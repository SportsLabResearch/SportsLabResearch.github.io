name: Update and deploy SportsLabResearch

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sportslabresearch-pages
  cancel-in-progress: false

jobs:
  update-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Update publications, GitHub and Zenodo
        run: python scripts/update_site.py

      - name: Commit generated pages
        run: |
          git config user.name "SportsLabResearch Bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/publications.md docs/software.md docs/zenodo.md
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update website data automatically"
            git push origin main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload generated site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
