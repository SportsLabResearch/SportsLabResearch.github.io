name: Update SportsLabResearch Website

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install requests beautifulsoup4

      - name: Update dynamic content
        run: python scripts/update_site.py

      - name: Commit generated content
        run: |
          git config user.name "SportsLabResearch Bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/publications.md docs/software.md docs/zenodo.md
          git diff --cached --quiet || git commit -m "Update website data automatically"
          git push

      - name: Deploy MkDocs
        run: python -m mkdocs gh-deploy --force
